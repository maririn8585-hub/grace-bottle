<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0b0b0d">
<title>GRACE Bottle</title>
<style>
:root{--bg:#0b0b0d;--panel:#17171b;--line:#2a2a31;--gold:#c8a66a;--gold2:#ead6a2;--text:#f7f4ed;--muted:#aaa7a1}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(circle at top right,#2b2115 0,#0b0b0d 34%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;min-height:100vh}
header{position:sticky;top:0;z-index:10;background:#0b0b0dee;backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:15px}
.head{max-width:980px;margin:auto;display:flex;align-items:center;gap:12px}.logo{width:44px;height:44px;border:1px solid var(--gold);border-radius:50%;display:grid;place-items:center;font:22px Georgia;color:var(--gold2)}
h1{font:20px Georgia;margin:0;letter-spacing:.1em}.sub{font-size:11px;color:var(--muted);margin-top:4px}.sync{margin-left:auto;font-size:12px;color:var(--gold2)}
main{max-width:980px;margin:auto;padding:16px 14px 100px}.tools{display:grid;grid-template-columns:1fr auto auto;gap:8px}
input,select,textarea,button{font:inherit}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:13px;background:#16161b;color:var(--text);padding:12px 13px;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}button{border:1px solid #b8965d;border-radius:13px;background:linear-gradient(135deg,#d4b579,#9b793f);color:#111;font-weight:800;padding:12px 14px}
button.alt{background:#25252c;color:var(--text);border-color:var(--line)}button.danger{background:#552d2d;color:#fff;border-color:#794242}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin:14px 0}.stat{background:#16161bdc;border:1px solid var(--line);border-radius:17px;padding:13px}.stat b{display:block;color:var(--gold2);font:25px Georgia}.stat span{font-size:12px;color:var(--muted)}
.cards{display:grid;gap:12px}.card{background:linear-gradient(145deg,#19191f,#121216);border:1px solid var(--line);border-radius:20px;padding:15px}.row{display:grid;grid-template-columns:86px 1fr;gap:14px;align-items:center}
.name{font-size:18px;font-weight:800}.meta{font-size:13px;color:var(--muted);line-height:1.55;margin-top:3px}.bname{font-weight:800;margin-top:8px}.percent{color:var(--gold2);font-weight:800}
.staff{display:inline-flex;align-items:center;gap:5px;margin-top:8px;padding:6px 10px;border-radius:999px;border:1px solid #6a5838;background:#2a2318;color:var(--gold2);font-size:13px}
.number-box{display:inline-flex;align-items:baseline;gap:7px;margin:0 0 10px;padding:8px 14px;border:1px solid #b8965d;border-radius:14px;background:linear-gradient(135deg,#302719,#18140e);box-shadow:inset 0 0 18px #c8a66a18}
.number-label{font-size:12px;color:var(--muted);font-weight:700}.number-value{font:900 32px/1 Georgia,"Hiragino Sans","Yu Gothic",sans-serif;color:var(--gold2);letter-spacing:.04em}
.actions{display:flex;gap:7px;margin-top:11px}.actions button{font-size:13px;padding:8px 10px}
.bottle{width:62px;margin:auto}.neck{width:22px;height:22px;background:#d8d5cc;border:2px solid #737373;border-bottom:0;border-radius:5px 5px 0 0;margin:auto}.glass{height:112px;border:3px solid #c7c7c799;border-radius:14px 14px 18px 18px;position:relative;overflow:hidden;background:#ffffff0a}
.liquid{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(#ca8d3a,#633515);transition:.15s}.liquid:before{content:"";position:absolute;left:0;right:0;top:-3px;height:7px;border-radius:50%;background:#e0aa51}.label{position:absolute;z-index:2;left:8px;right:8px;top:42px;height:31px;background:#efe7d2;color:#2d251b;display:grid;place-items:center;font:9px Georgia;border:1px solid #ad9c79}
dialog{width:min(760px,calc(100% - 18px));border:1px solid var(--line);border-radius:22px;padding:0;background:#121216;color:var(--text);box-shadow:0 25px 80px #000a}dialog::backdrop{background:#000b}.modal{padding:18px}.modal h2{margin:0 0 14px;color:var(--gold2);font-family:Georgia}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.full{grid-column:1/-1}label{font-size:13px;font-weight:700;display:block;margin-bottom:6px}.rangebox{display:grid;grid-template-columns:105px 1fr;gap:15px;align-items:center;border:1px solid var(--line);border-radius:16px;padding:13px;background:#18181d}
.big{font:29px Georgia;color:var(--gold2)}input[type=range]{padding:0;accent-color:var(--gold);background:transparent}.hint{font-size:11px;color:var(--muted);margin-top:5px}.modalactions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
.empty{text-align:center;color:var(--muted);padding:35px}.fab{position:fixed;right:18px;bottom:22px;width:60px;height:60px;border-radius:50%;font-size:28px}
.notice{display:none;margin:12px 0;padding:12px;border:1px solid #6e5a34;background:#2a2318;border-radius:14px;color:#f1ddb0;font-size:13px;line-height:1.5}
@media(max-width:760px){.tools{grid-template-columns:1fr 1fr}.tools input{grid-column:1/-1}.grid{grid-template-columns:1fr}.full{grid-column:auto}.stats{grid-template-columns:1fr 1fr}.stats .stat:last-child{grid-column:1/-1}.number-value{font-size:36px}}
</style>
</head>
<body>
<header><div class="head"><div class="logo">G</div><div><h1>GRACE BOTTLE</h1><div class="sub">BOTTLE MANAGER · STAFF & NUMBER UPDATE</div></div><div class="sync" id="syncState">Firebase接続中…</div></div></header>
<main>
<div class="tools">
<input id="search" placeholder="番号・名前・会社名・あだ名・誕生日・メモ・ボトル名・担当で検索">
<select id="sort"><option value="new">新しい登録順</option><option value="numberAsc">ボトル番号 昇順</option><option value="numberDesc">ボトル番号 降順</option><option value="name">お客様名順</option></select>
<button id="addBtn">＋ 新規登録</button>
</div>
<div id="notice" class="notice"></div>
<div class="stats"><div class="stat"><b id="customers">0</b><span>お客様</span></div><div class="stat"><b id="bottles">0</b><span>保有ボトル</span></div><div class="stat"><b id="low">0</b><span>残量25%以下</span></div></div>
<div id="cards" class="cards"></div>
</main>
<button id="fab" class="fab">＋</button>
<dialog id="editDialog"><form id="form" class="modal"><h2 id="formTitle">新規登録</h2><input type="hidden" id="id">
<div class="grid">
<div><label>ボトルナンバー</label><input id="bottleNumber" required inputmode="numeric" placeholder="例：128"></div>
<div><label>お客様名</label><input id="customer" required></div>
<div><label>ふりがな</label><input id="kana"></div>
<div><label>会社名</label><input id="company"></div>
<div><label>あだ名</label><input id="nickname"></div>
<div><label>誕生日</label><input id="birthday" type="date"></div>
<div><label>ボトル名</label><input id="bottleName" required></div>
<div><label>種類</label><select id="category"><option>ウイスキー</option><option>焼酎</option><option>ブランデー</option><option>シャンパン</option><option>ワイン</option><option>その他</option></select></div>
<div><label>入れた日</label><input id="opened" type="date"></div>
<div><label>担当キャスト（自由入力）</label><input id="staff" placeholder="例：りさ"></div>
<div><label>棚・保管場所</label><input id="shelf" placeholder="例：A棚・上段"></div>
<div class="full"><label>ボトル残量</label><div class="rangebox"><div id="formBottle"></div><div><div class="big"><span id="pv">50</span>%</div><input id="remaining" type="range" min="0" max="100" step="5" value="50"><div class="hint">指で左右に動かして調整</div></div></div></div>
<div class="full"><label>メモ</label><textarea id="memo" rows="3"></textarea></div>
</div><div class="modalactions"><button type="button" class="alt" id="cancel">キャンセル</button><button type="submit">保存する</button></div></form></dialog>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getFirestore, collection, addDoc, doc, updateDoc, deleteDoc, onSnapshot, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";
const firebaseConfig={"apiKey":"AIzaSyD86EJ0Q08zhMZPSep4qUkNg5sAfZo0U5E","authDomain":"grace-bottle.firebaseapp.com","projectId":"grace-bottle","storageBucket":"grace-bottle.firebasestorage.app","messagingSenderId":"284417024203","appId":"1:284417024203:web:c2c8e55a3c0286a2c6fb4e"};
const app=initializeApp(firebaseConfig),db=getFirestore(app),bottlesRef=collection(db,"bottles"),$=id=>document.getElementById(id);
let records=[];const editDialog=$("editDialog");
function esc(s=""){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]))}
function bottle(p){p=Math.max(0,Math.min(100,Number(p)||0));return `<div class="bottle"><div class="neck"></div><div class="glass"><div class="liquid" style="height:${p}%"></div><div class="label">GRACE</div></div></div>`}
function numVal(v){const m=String(v??"").match(/\d+/);return m?Number(m[0]):999999999}
function formatBirthday(v){if(!v)return"";const p=v.split("-");return p.length===3?`${Number(p[1])}月${Number(p[2])}日`:v}
function showNotice(msg){$("notice").style.display="block";$("notice").textContent=msg}function hideNotice(){$("notice").style.display="none"}
onSnapshot(query(bottlesRef,orderBy("createdAt","desc")),snap=>{records=snap.docs.map(d=>({id:d.id,...d.data()}));$("syncState").textContent="Firebase同期中";hideNotice();render()},err=>{console.error(err);$("syncState").textContent="接続エラー";showNotice("Firestoreのルール設定を確認してください。")});
function render(){
 const q=$("search").value.trim().toLowerCase();
 let f=records.filter(r=>Object.values(r).join(" ").toLowerCase().includes(q));
 const s=$("sort").value;
 if(s==="numberAsc")f.sort((a,b)=>numVal(a.bottleNumber)-numVal(b.bottleNumber));
 if(s==="numberDesc")f.sort((a,b)=>numVal(b.bottleNumber)-numVal(a.bottleNumber));
 if(s==="name")f.sort((a,b)=>(a.kana||a.customer||"").localeCompare(b.kana||b.customer||"","ja"));
 $("customers").textContent=new Set(records.map(r=>r.customer)).size;$("bottles").textContent=records.length;$("low").textContent=records.filter(r=>+r.remaining<=25).length;
 $("cards").innerHTML=f.length?f.map(r=>`<article class="card"><div class="row">${bottle(r.remaining)}<div>
 <div class="number-box"><span class="number-label">ボトル番号</span><span class="number-value">${esc(r.bottleNumber||"未登録")}</span></div>
 <div class="name">${esc(r.customer)}${r.nickname?"（"+esc(r.nickname)+"）":""}</div>
 <div class="meta">${esc(r.company||"会社名未登録")}<br>${esc(r.kana||"")}${r.birthday?`<br>誕生日：${esc(formatBirthday(r.birthday))}`:""}</div>
 <span class="staff">👩 担当：${esc(r.staff||"未登録")}</span>
 <div class="bname">${esc(r.bottleName)}</div><div class="meta">${esc(r.category||"")}｜${esc(r.opened||"日付未登録")}${r.shelf?"｜"+esc(r.shelf):""}</div>
 <div class="percent">残量 ${+r.remaining}%</div>${r.memo?'<div class="meta">メモ：'+esc(r.memo)+'</div>':""}
 <div class="actions"><button data-edit="${r.id}">編集</button><button class="danger" data-del="${r.id}">削除</button></div></div></div></article>`).join(""):'<div class="empty">登録がありません</div>';
 document.querySelectorAll("[data-edit]").forEach(b=>b.onclick=()=>editItem(b.dataset.edit));document.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>removeItem(b.dataset.del));
}
function setRange(v){$("remaining").value=v;$("pv").textContent=v;$("formBottle").innerHTML=bottle(v)}
function openNew(){$("form").reset();$("id").value="";$("formTitle").textContent="新規登録";$("opened").value=new Date().toISOString().slice(0,10);setRange(50);editDialog.showModal()}
function editItem(id){const r=records.find(x=>x.id===id);if(!r)return;$("id").value=r.id;$("bottleNumber").value=r.bottleNumber||"";$("customer").value=r.customer||"";$("kana").value=r.kana||"";$("company").value=r.company||"";$("nickname").value=r.nickname||"";$("birthday").value=r.birthday||"";$("bottleName").value=r.bottleName||"";$("category").value=r.category||"ウイスキー";$("opened").value=r.opened||"";$("staff").value=r.staff||"";$("shelf").value=r.shelf||"";$("memo").value=r.memo||"";setRange(r.remaining||0);$("formTitle").textContent="登録内容を編集";editDialog.showModal()}
async function removeItem(id){if(!confirm("この登録を削除しますか？"))return;await deleteDoc(doc(db,"bottles",id))}
$("form").onsubmit=async e=>{e.preventDefault();const id=$("id").value;const data={bottleNumber:$("bottleNumber").value.trim(),customer:$("customer").value.trim(),kana:$("kana").value.trim(),company:$("company").value.trim(),nickname:$("nickname").value.trim(),birthday:$("birthday").value||"",bottleName:$("bottleName").value.trim(),category:$("category").value,opened:$("opened").value||"",remaining:+$("remaining").value,staff:$("staff").value.trim(),shelf:$("shelf").value.trim(),memo:$("memo").value.trim(),updatedAt:serverTimestamp()};try{if(id)await updateDoc(doc(db,"bottles",id),data);else await addDoc(bottlesRef,{...data,createdAt:serverTimestamp()});editDialog.close()}catch(err){console.error(err);alert("保存できませんでした。Firestoreのルール設定を確認してください。")}};
$("remaining").oninput=e=>setRange(e.target.value);$("search").oninput=render;$("sort").onchange=render;$("addBtn").onclick=openNew;$("fab").onclick=openNew;$("cancel").onclick=()=>editDialog.close();setRange(50);
</script>
</body>
</html>
